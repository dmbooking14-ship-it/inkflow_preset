<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkflow | Tattoo Consultation</title>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <style>
        :root { --gold: #c5a059; --dark: #121212; --grey: #1e1e1e; --text: #e0e0e0; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--grey); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: var(--gold); text-align: center; font-size: 24px; letter-spacing: 2px; }
        p { text-align: center; font-size: 14px; color: #888; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .upload-btn { background: #333; color: var(--gold); border: 1px dashed var(--gold); padding: 15px; text-align: center; cursor: pointer; border-radius: 6px; margin-bottom: 20px; }
        button[type="submit"] { width: 100%; padding: 15px; background: var(--gold); border: none; color: black; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; }
        #image-preview { font-size: 12px; color: var(--gold); margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>INKFLOW</h1>
    <p>Pre-Consultation Intake Form</p>

    <form action="https://formspree.io/f/meerrewb" method="POST">
        
        <label>Full Name</label>
        <input type="text" name="name" placeholder="John Doe" required>

        <label>Instagram Handle</label>
        <input type="text" name="ig_handle" placeholder="@username" required>

        <label>Placement on Body</label>
        <input type="text" name="placement" placeholder="e.g. Left Forearm" required>

        <label>Approximate Size (Inches)</label>
        <input type="number" name="size" placeholder="e.g. 4" required>

        <label>Tattoo Concept & Details</label>
        <textarea name="details" rows="4" placeholder="Describe your idea..." required></textarea>

        <label>Reference Images</label>
        <div class="upload-btn" id="upload_widget">Click to Upload Photos</div>
        <div id="image-preview">No images uploaded yet</div>
        <input type="hidden" name="image_urls" id="image_urls">

        <label>Budget Range</label>
        <select name="budget" required>
            <option value="Under $200">Under $200 (Artist Minimum is $200)</option>
            <option value="$200 - $500">$200 - $500</option>
            <option value="$500 - $1000">$500 - $1000</option>
            <option value="$1000+">$1000+</option>
        </select>

        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
    // Cloudinary Setup (You will need to create a free account to get these)
    const cloudName = "dfkg9iswc"; 
    const uploadPreset = "inkflow_preset";

    var myWidget = cloudinary.createUploadWidget({
        cloudName: cloudName, 
        uploadPreset: uploadPreset}, (error, result) => { 
            if (!error && result && result.event === "success") { 
                console.log('Done! Here is the image info: ', result.info); 
                document.getElementById('image_urls').value += result.info.secure_url + ", ";
                document.getElementById('image-preview').innerText = "Image uploaded successfully!";
            }
        }
    );

    document.getElementById("upload_widget").addEventListener("click", function(){
        myWidget.open();
    }, false);
</script>

</body>
</html>
